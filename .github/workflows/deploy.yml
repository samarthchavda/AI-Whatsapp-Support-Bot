name: CI/CD Deploy to Production VPS

on:
  push:
    branches:
      - main # Trigger deployment when pushing to main branch

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'

      - name: Install Backend Dependencies
        run: |
          cd backend
          npm install

      - name: Install Frontend Dependencies & Test Build
        run: |
          cd frontend
          npm install
          npm run build

  deploy:
    needs: test-and-build # Run deployment only if tests & builds pass
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "🚀 Deploying Kwickbot to Server..."
            cd /home/ubuntu/whatsapp-bot
            
            # Reset local changes and pull latest code
            git reset --hard
            git pull origin main
            
            # Install backend packages
            cd backend
            npm install
            
            # Build React frontend
            cd ../frontend
            npm install
            npm run build
            
            # Restart backend server
            pm2 restart whatsapp-ai-backend
            pm2 save
            
            echo "🎉 Deployment Completed Successfully!"
